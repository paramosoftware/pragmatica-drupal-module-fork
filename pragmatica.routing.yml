pragmatica.dashboard:
  path: '/admin/pragmatica'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\PragmaticaController::dashboard'
    _title: 'Painel - Pragmática'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE

pragmatica.import:
  path: '/admin/pragmatica/import'
  defaults:
    _title: 'Importar dados'
    _controller: '\Drupal\pragmatica\Controller\ImportController::importForm'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE


###################################################
######## Search public route ######################
###################################################

pragmatica.search_public:
  path: '/pragmatica/busca'
  defaults:
      _controller: '\Drupal\pragmatica\Controller\PragmaticaPublicController::search'
      _title: 'Buscar'
  requirements:
      _access: 'TRUE'

###################################################
######## Source public routes #####################
###################################################

pragmatica.source_public_list:
  path: '/pragmatica/fontes'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\SourcePublicController::list'
    _title: 'Fontes'
  requirements:
    _access: 'TRUE'

pragmatica.source_public_item:
  path: '/pragmatica/fonte/{pragmatica_source}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\SourcePublicController::item'
    _title_callback: '\Drupal\pragmatica\Controller\SourcePublicController::itemTitle'
  requirements:
    pragmatica_source: \d+
    _access: 'TRUE'
  options:
    parameters:
      pragmatica_source:
        type: 'entity:pragmatica_source'

###################################################
######## Code public routes #######################
###################################################

pragmatica.code_public_list:
  path: '/pragmatica/codigos'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\CodePublicController::list'
    _title: 'Códigos'
  requirements:
    _access: 'TRUE'

pragmatica.code_public_item:
  path: '/pragmatica/codigo/{pragmatica_code}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\CodePublicController::item'
    _title_callback: '\Drupal\pragmatica\Controller\CodePublicController::itemTitle'
  requirements:
    pragmatica_code: \d+
    _access: 'TRUE'

###################################################
############### Code routes #######################
###################################################

entity.pragmatica_code.collection:
  path: '/admin/pragmatica/code'
  defaults:
    _entity_list: 'pragmatica_code'
    _title: 'Códigos'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE

entity.pragmatica_code.canonical:
  path: '/admin/pragmatica/code/{pragmatica_code}'
  defaults:
    _entity_view: 'pragmatica_code'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE

entity.pragmatica_code.add_form:
  path: '/admin/pragmatica/code/add'
  defaults:
    _entity_form: 'pragmatica_code.add'
    _title: 'Adicionar código'
  requirements:
    _permission: 'pragmatica'
  options:
      _admin_route: TRUE

entity.pragmatica_code.edit_form:
  path: '/admin/pragmatica/code/{pragmatica_code}/edit'
  defaults:
    _entity_form: 'pragmatica_code.edit'
    _title: 'Editar código'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE


entity.pragmatica_code.delete_form:
