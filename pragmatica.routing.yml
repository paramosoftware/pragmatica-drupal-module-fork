pragmatica.dashboard:
  path: '/admin/pragmatica'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\PragmaticaController::dashboard'
    _title: 'Painel - Pragmática'
  requirements:
    _permission: 'administer pragmatica'
  options:
    _admin_route: TRUE

pragmatica.import.seed:
  path: '/admin/pragmatica/import/seed'
  defaults:
    _title: 'Importar listas controladas (CSV)'
    _controller: '\Drupal\pragmatica\Controller\ImportController::importSeedForm'
  requirements:
    _permission: 'administer pragmatica'
  options:
    _admin_route: TRUE

pragmatica.import.research:
  path: '/admin/pragmatica/import/research'
  defaults:
    _title: 'Importar dados de pesquisa (CSV)'
    _controller: '\Drupal\pragmatica\Controller\ImportController::importResearchForm'
  requirements:
    _permission: 'administer pragmatica'
  options:
    _admin_route: TRUE


###################################################################################################################
############################################ Public routes ########################################################
###################################################################################################################

###################################################
############## Search public ######################
###################################################

pragmatica.public.search:
  path: '/pragmatica/busca'
  defaults:
      _controller: '\Drupal\pragmatica\Controller\PragmaticaPublicController::search'
      _title: 'Buscar'
  requirements:
      _permission: 'pragmatica view public'


###################################################
######## Label public #############################
###################################################

pragmatica.public.label.item:
  path: '/pragmatica/etiqueta/{pragmatica_label}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\LabelPublicController::item'
    _title_callback: '\Drupal\pragmatica\Controller\LabelPublicController::itemTitle'
  requirements:
    pragmatica_label: \d+
    _permission: 'pragmatica view public'

pragmatica.public.label.list:
  path: '/pragmatica/etiquetas'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\LabelPublicController::list'
    _title: 'Etiquetas'
  requirements:
    _permission: 'pragmatica view public'

###################################################
################# response public #################
###################################################


pragmatica.public.response.item:
  path: '/pragmatica/resposta/{pragmatica_response}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\ResponsePublicController::item'
    _title: 'Resposta'
  requirements:
    _permission: 'pragmatica view public'


###################################################
################# Situation public ################
###################################################

pragmatica.public.situation.item:
  path: '/pragmatica/situacao/{pragmatica_situation}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\SituationPublicController::item'
    _title: 'Situação'
  requirements:
    _permission: 'pragmatica view public'

###################################################
################# Informant public ################
###################################################

pragmatica.public.informant.item:
  path: '/pragmatica/informante/{pragmatica_informant}'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\InformantPublicController::item'
    _title: 'Informante'
  requirements:
    _permission: 'pragmatica view public'



